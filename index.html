<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS基本リファレンス</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>CSS基本プロパティ：まとめ</h1>
    </header>

    <main>
        <section class="section-color">
            <h2>1. 色と背景 (Color & Background)</h2>
            <p class="color-box">背景色と文字色のテスト</p>
        </section>
        <section class="section-text">
            <h2>2. テキストとフォント (Text & Font)</h2>
            <p class="text-default">
                これがデフォルトのテキストです。ダミーテキストを追加・・・
            </p>
            <p class="text-custom">
                これはCSSで調整したテキストです。ダミーテキストを追加・・・
            </p>
        </section>
         <section class="section-list">
            <h2>3. リスト (List)</h2>
            <ul class="custom-list">
                <li>リスト項目その１</li>
                <li>リスト項目その２</li>
                <li>リスト項目その３</li>
            </ul>
        </section>

    </main>

    <footer>
        <small>&copy; Webデザイン演習</small>
    </footer>

</body>

</html>
